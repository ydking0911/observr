name: Release

on:
  push:
    tags:
      - "v*.*.*"   # e.g. v0.1.0

permissions:
  contents: write

jobs:
  # ── Build dashboard first (embedded into binary) ──────────────────────
  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Build
        working-directory: dashboard
        run: npm ci && npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: server/internal/dashboard/dist/
          retention-days: 1

  # ── Build Go binaries for all platforms ──────────────────────────────
  build-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    needs: build-dashboard

    strategy:
      matrix:
        include:
          # Linux (CGO via native runner)
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            asset_name: observrd-linux-amd64

          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            asset_name: observrd-linux-arm64
            cc: aarch64-linux-gnu-gcc

          # macOS
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            asset_name: observrd-darwin-amd64

          - goos: darwin
            goarch: arm64
            runner: macos-latest
            asset_name: observrd-darwin-arm64

          # Windows
          - goos: windows
            goarch: amd64
            runner: windows-latest
            asset_name: observrd-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Download dashboard dist
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: server/internal/dashboard/dist/

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: server/go.sum

      # Linux arm64 cross-compile toolchain
      - name: Install arm64 cross compiler
        if: matrix.goarch == 'arm64' && matrix.goos == 'linux'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install sqlite3 (Linux)
        if: matrix.goos == 'linux'
        run: sudo apt-get install -y gcc libc-dev

      - name: go mod tidy
        working-directory: server
        run: go mod tidy

      - name: Build
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc || '' }}
        shell: bash
        run: |
          mkdir -p bin
          EXT=""
          [[ "${{ matrix.goos }}" == "windows" ]] && EXT=".exe"
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o bin/${{ matrix.asset_name }} \
            ./cmd/observrd

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: server/bin/${{ matrix.asset_name }}
          retention-days: 1

  # ── Create GitHub Release ──────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: "observrd-*"
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum observrd-* > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          # Extract section between this tag and the previous one from CHANGELOG if it exists
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag{print}" CHANGELOG.md)
          else
            NOTES="See [README](README.md) for usage and setup."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: observr ${{ github.ref_name }}
          body: |
            ## observr ${{ github.ref_name }}

            ${{ steps.changelog.outputs.notes }}

            ## Installation

            **macOS (Apple Silicon)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/observrd-darwin-arm64 -o observrd
            chmod +x observrd && sudo mv observrd /usr/local/bin/
            observrd start
            ```

            **macOS (Intel)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/observrd-darwin-amd64 -o observrd
            chmod +x observrd && sudo mv observrd /usr/local/bin/
            ```

            **Linux (amd64)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/observrd-linux-amd64 -o observrd
            chmod +x observrd && sudo mv observrd /usr/local/bin/
            ```

            **Python SDK**
            ```bash
            pip install observr==${{ github.ref_name }}
            ```

            ## Verify checksums
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
          files: |
            dist/observrd-linux-amd64
            dist/observrd-linux-arm64
            dist/observrd-darwin-amd64
            dist/observrd-darwin-arm64
            dist/observrd-windows-amd64.exe
            dist/SHA256SUMS.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v0.1.0-rc1 → prerelease
