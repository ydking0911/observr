name: Release on Merge to Main

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from PR label
        id: version
        run: |
          BARE=$(echo '${{ toJson(github.event.pull_request.labels.*.name) }}' \
            | jq -r '.[] | select(test("^v?[0-9]+\\.[0-9]+\\.[0-9]+$"))' \
            | sed 's/^v//' | head -1)
          if [ -z "$BARE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false"     >> "$GITHUB_OUTPUT"
            echo "version=v$BARE" >> "$GITHUB_OUTPUT"
            echo "bare=$BARE"     >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.version.outputs.skip != 'true'
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump sdk/node/package.json
        if: steps.version.outputs.skip != 'true'
        run: |
          jq '.version = "${{ steps.version.outputs.bare }}"' \
            sdk/node/package.json > tmp.json && mv tmp.json sdk/node/package.json

      - name: Bump sdk/node/package-lock.json
        if: steps.version.outputs.skip != 'true'
        working-directory: sdk/node
        run: npm install --package-lock-only --ignore-scripts

      - name: Bump sdk/python/pyproject.toml
        if: steps.version.outputs.skip != 'true'
        run: |
          sed -i 's/^version = .*/version = "${{ steps.version.outputs.bare }}"/' \
            sdk/python/pyproject.toml

      - name: Commit and tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sdk/node/package.json sdk/node/package-lock.json sdk/python/pyproject.toml
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }}"
          git tag ${{ steps.version.outputs.version }}
          git push origin main
          git push origin ${{ steps.version.outputs.version }}
