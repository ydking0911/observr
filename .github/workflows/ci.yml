name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python SDK ────────────────────────────────────────────────────────
  python:
    name: Python SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install SDK + dev dependencies
        run: pip install -e "sdk/python[dev]"

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check sdk/python/observr sdk/python/tests

      - name: Unit tests
        run: |
          cd sdk/python
          python -m pytest tests/test_transport.py tests/test_logger.py -v

      - name: Integration tests (FastAPI)
        run: |
          cd sdk/python
          python -m pytest tests/test_integration.py -v -k "fastapi or log or span"

  # ── Go server ─────────────────────────────────────────────────────────
  go:
    name: Go Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: server/go.sum

      - name: Install system deps (CGO for sqlite3)
        run: sudo apt-get install -y gcc libc-dev

      - name: go mod tidy check
        working-directory: server
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        working-directory: server
        run: go vet ./...

      - name: Unit tests (with race detector)
        working-directory: server
        run: go test ./... -v -count=1 -race -timeout 60s

      - name: Build binary
        working-directory: server
        run: |
          mkdir -p bin
          CGO_ENABLED=1 go build -ldflags="-s -w" -o bin/observrd ./cmd/observrd
          echo "Binary size: $(du -sh bin/observrd | cut -f1)"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: observrd-linux-amd64
          path: server/bin/observrd
          retention-days: 7

  # ── Dashboard ─────────────────────────────────────────────────────────
  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Type check
        working-directory: dashboard
        run: npx tsc --noEmit

      - name: Build
        working-directory: dashboard
        run: npm run build

      - name: Verify dist output
        run: |
          test -f server/internal/dashboard/dist/index.html
          echo "Dashboard build OK"

  # ── E2E (requires Go binary + Python SDK) ─────────────────────────────
  e2e:
    name: E2E Test
    runs-on: ubuntu-latest
    needs: [go, dashboard]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: server/go.sum

      - name: Install system deps
        run: sudo apt-get install -y gcc libc-dev

      - name: Build dashboard
        working-directory: dashboard
        run: npm ci && npm run build

      - name: Build observrd
        working-directory: server
        run: |
          go mod tidy
          mkdir -p bin
          CGO_ENABLED=1 go build -ldflags="-s -w" -o bin/observrd ./cmd/observrd

      - name: Install Python SDK
        run: pip install -e "sdk/python[dev]" httpx uvicorn fastapi

      - name: Run e2e test
        run: python scripts/test_e2e.py
